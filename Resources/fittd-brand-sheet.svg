  <text x="48" y="502" class="m" font-size="12" fill="#717D83" letter-spacing="1">CYAN RAMP</text>
  <g>
    <rect x="48"  y="514" width="112" height="46" rx="8" fill="#E6FAFD"/>
    <rect x="166" y="514" width="112" height="46" rx="8" fill="#C3F2F9"/>
    <rect x="284" y="514" width="112" height="46" rx="8" fill="#8FE7F1"/>
    <rect x="402" y="514" width="112" height="46" rx="8" fill="#1FC2D6"/>
    <rect x="520" y="514" width="112" height="46" rx="8" fill="#08B6D0"/>
    <rect x="638" y="514" width="112" height="46" rx="8" fill="#0A8FA6"/>
    <rect x="756" y="514" width="112" height="46" rx="8" fill="#0C7383"/>
    <rect x="874" y="514" width="112" height="46" rx="8" fill="#124B56"/>
  </g>
  <g class="c" font-size="10" fill="#515D63">
    <text x="52" y="576">50</text>
    <text x="170" y="576">100</text>
    <text x="288" y="576">200</text>
    <text x="406" y="576">400</text>
    <text x="524" y="576">500</text>
    <text x="642" y="576">600</text>
    <text x="760" y="576">700</text>
    <text x="878" y="576">900</text>
  </g>

