  <g>
    <rect x="48"  y="624" width="112" height="46" rx="8" fill="#F7F9FA" stroke="#DFE6E9"/>
    <rect x="166" y="624" width="112" height="46" rx="8" fill="#EEF2F4"/>
    <rect x="284" y="624" width="112" height="46" rx="8" fill="#DFE6E9"/>
    <rect x="402" y="624" width="112" height="46" rx="8" fill="#9DA9AE"/>
    <rect x="520" y="624" width="112" height="46" rx="8" fill="#717D83"/>
    <rect x="638" y="624" width="112" height="46" rx="8" fill="#515D63"/>
    <rect x="756" y="624" width="112" height="46" rx="8" fill="#3A454B"/>
    <rect x="874" y="624" width="112" height="46" rx="8" fill="#0F1A20"/>
  </g>
  <g class="c" font-size="10" fill="#515D63">
    <text x="52" y="686">50</text>
    <text x="170" y="686">100</text>
    <text x="288" y="686">200</text>
    <text x="406" y="686">400</text>
    <text x="524" y="686">500</text>
    <text x="642" y="686">600</text>
    <text x="760" y="686">700</text>
    <text x="878" y="686">900</text>
  </g>

  <text x="48" y="726" class="m" font-size="12" fill="#9DA9AE">Wordmark type: Manrope 700–800 · Body: Inter · Data/mono: system monospace</text>
</svg>
