<svg width="520" height="140" viewBox="0 0 520 140" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Fitt.d logo">
  <defs>
    <linearGradient id="fittdCyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#12C6DE"/>
      <stop offset="1" stop-color="#0894A8"/>
    </linearGradient>
  </defs>

  <!-- Icon (scaled 512 -> 108, placed at 16,16) -->
  <g transform="translate(16,16) scale(0.2109375)">
    <rect x="32" y="32" width="448" height="448" rx="120" fill="url(#fittdCyan)"/>
    <g fill="#FFFFFF">
      <rect x="182" y="150" width="56" height="232" rx="16"/>
      <rect x="182" y="150" width="176" height="56" rx="16"/>
      <rect x="182" y="252" width="140" height="52" rx="16"/>
    </g>
    <circle cx="338" cy="356" r="28" fill="#FF6F61"/>
  </g>

  <!-- Wordmark. Font: Manrope (700). Falls back to a geometric system sans. -->
  <text x="148" y="92" font-family="Manrope, 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif"
        font-size="72" font-weight="700" letter-spacing="-2">
    <tspan fill="#0B1F2A">Fitt</tspan><tspan fill="#08B6D0">.</tspan><tspan fill="#0B1F2A">d</tspan>
  </text>
</svg>
