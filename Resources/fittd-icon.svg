<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Fitt.d icon">
  <defs>
    <linearGradient id="fittdCyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#12C6DE"/>
      <stop offset="1" stop-color="#0894A8"/>
    </linearGradient>
  </defs>
  <!-- App tile -->
  <rect x="32" y="32" width="448" height="448" rx="120" fill="url(#fittdCyan)"/>
  <!-- F mark (white) — overlapping same-fill rects union cleanly -->
  <g fill="#FFFFFF">
    <rect x="182" y="150" width="56" height="232" rx="16"/>
    <rect x="182" y="150" width="176" height="56" rx="16"/>
    <rect x="182" y="252" width="140" height="52" rx="16"/>
  </g>
  <!-- The Fitt.d dot -->
  <circle cx="338" cy="356" r="28" fill="#FF6F61"/>
</svg>
